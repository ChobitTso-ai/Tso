<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tso 專案集 - Project Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .project-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .project-icon {
            font-size: 4em;
            margin-bottom: 20px;
            text-align: center;
        }

        .project-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .project-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .project-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .status-active {
            background: #4CAF50;
            color: white;
        }

        .status-coming {
            background: #FFC107;
            color: white;
        }

        .minecraft-card {
            background: linear-gradient(135deg, #5FAD41 0%, #8B6F47 100%);
            color: white;
        }

        .minecraft-card .project-title,
        .minecraft-card .project-description {
            color: white;
        }

        footer {
            text-align: center;
            color: white;
            padding: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Tso 專案集</h1>
            <p class="subtitle">歡迎來到我的專案展示空間</p>
        </header>

        <div class="projects-grid">
            <!-- Minecraft 知識競賽 -->
            <a href="minecraft-quiz/" class="project-card minecraft-card">
                <div class="project-icon">⛏️</div>
                <div class="project-title">Minecraft 知識競賽</div>
                <div class="project-description">
                    一個有趣的 Minecraft 主題測驗遊戲！支援選擇題和填空題，包含金幣、體力、商店系統。透過遊戲化學習，讓複習功課變得更有趣！
                </div>
                <span class="project-status status-active">✨ 立即遊玩</span>
            </a>

            <!-- 預留空間給未來專案 -->
            <div class="project-card" style="opacity: 0.6; cursor: default;">
                <div class="project-icon">🎯</div>
                <div class="project-title">專案 2</div>
                <div class="project-description">
                    即將推出的新專案...
                </div>
                <span class="project-status status-coming">🚧 規劃中</span>
            </div>

            <div class="project-card" style="opacity: 0.6; cursor: default;">
                <div class="project-icon">💡</div>
                <div class="project-title">專案 3</div>
                <div class="project-description">
                    即將推出的新專案...
                </div>
                <span class="project-status status-coming">🚧 規劃中</span>
            </div>
        </div>

        <footer>
            <p>Built with ❤️ | © 2026 Tso Projects</p>
        </footer>
    </div>
</body>
</html>
